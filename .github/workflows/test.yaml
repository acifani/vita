name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup tinygo
        uses: acifani/setup-tinygo@v3
        with:
          tinygo-version: 0.40.1

      - name: test
        run: make test
